name: build-kernel-image
on:
  workflow_dispatch:
env:
  CLANG_DIR: clang-r510928
jobs:
  build-kernel-image:
    runs-on: ubuntu-22.04
    steps:
#      - name: Free disk space
#        if: ${{ true }}
#        uses: jlumbroso/free-disk-space@main
#        with:
#          tool-cache: true
#          android: true
#          dotnet: true
#          haskell: true
#          large-packages: true
#          docker-images: true
#          swap-storage: false
      - name: Set swap space
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 16
      - name: Increase file limit
        run: |
          sudo sysctl -w vm.swappiness=100
      - name: Check repository
        uses: actions/checkout@v6.0.2
        with:
          path: aospa-marble-kernel
      - name: Setup Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: 'pypy3.11'
      - name: Setup build environment
        run: |
          sudo apt-get update
          sudo apt-get install -y bc device-tree-compiler
          sudo curl --create-dirs -o /usr/local/bin/repo -L https://storage.googleapis.com/git-repo-downloads/repo
          sudo chmod a+rx /usr/local/bin/repo
      - name: Clone repo and sync
        run: |
          repo init -u https://github.com/alex18101985/aospa-marble-kernel -b "$(git -C aospa-marble-kernel branch --show-current)" -m manifest.xml --depth=1
          repo sync
          mkdir -p kernel_platform/device/xiaomi/marble-kernel/dtbs
      - name: Cache Clang
        uses: actions/cache@v5.0.4
        with:
          path: kernel_platform/clang
          key: clang-r510928
      - name: Setup Clang
        run: |
          mkdir -p kernel_platform/clang
          cd kernel_platform/clang
          if [ ! -d "${CLANG_DIR}" ]; then
            echo "Clang not found in cache. Downloading..."
            git clone -n --depth=1 --filter=tree:0 -b main-kernel-build-2024 --single-branch \
              https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 .
            git sparse-checkout init --cone
            git sparse-checkout set ${CLANG_DIR}
            git checkout
          else
            echo "Using cached ${CLANG_DIR}"
          fi
      - name: Include KernelSU
        run: |
          cd kernel_platform/xiaomi/sm8450
          rmdir KernelSU
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -
      - name: Include SuSFS
        run: |
          HOME="$(pwd)"
          cp -r susfs4ksu/kernel_patches/* kernel_platform/xiaomi/sm8450
          cd kernel_platform/xiaomi/sm8450/KernelSU
          patch -p1 < 10_enable_susfs_for_ksu.patch
          cd ..
          patch -p1 < 50_add_susfs_in_gki-android12-5.10.patch
      - name: Include KernelSU Next manager signature
        run: |
          set -e
          FILE="kernel_platform/xiaomi/sm8450/KernelSU/kernel/manager/apk_sign.c"
          SIG='check_v2_signature(path, 0x3e6, "79e590113c4c4c0c222978e413a5faa801666957b1212a328e46c00c69821bf7")'
          echo "[*] Checking if signature already exists..."
          if grep -q "$SIG" "$FILE"; then
            echo "✔ Signature already present — skipping patch"
            exit 0
          fi
          echo "[*] Applying patch..."
          sed -i '0,/check_v2_signature(path, EXPECTED_SIZE, EXPECTED_HASH)/{
            s/check_v2_signature(path, EXPECTED_SIZE, EXPECTED_HASH)/check_v2_signature(path, EXPECTED_SIZE, EXPECTED_HASH) || '"$SIG"'/
          }' "$FILE"
          echo "[*] Verifying patch..."
          if ! grep -q "$SIG" "$FILE"; then
            echo "❌ Patch failed — signature not found"
            exit 1
          fi
          echo "✔ Patch applied successfully"
      - name: Patch with custom configuration
        run: |
          cp -rvf aospa-marble-kernel/android_kernel_xiaomi_sm8450/. kernel_platform/xiaomi/sm8450
          cd kernel_platform/xiaomi/sm8450
          patch -p1 < no-strict-error.patch
      - name: Build kernel
        run: |
          cd kernel_platform/xiaomi/sm8450
          export PATH=$PWD/kernel_platform/clang/${CLANG_DIR}/bin:$PATH
          ./build.sh marble --only-kernel
      - name: Zip kernel
        run: |
          git clone --depth=1 -b master https://github.com/alex18101985/AnyKernel3.git AnyKernel3-master
          cd AnyKernel3-master
          cp ../kernel_platform/device/xiaomi/marble-kernel/Image .
          rm -r .git README.md
          find . -type f -name 'placeholder' -delete
          find . -type d -empty -delete
          zip -r9 "../kernel.zip" *
      - name: Generate release tag
        id: tag
        run: echo "release_tag=AOSPA_Marble_GKI_KSUNext_SuSFS_$(date +'%Y.%m.%d_%H%M')" >> "$GITHUB_OUTPUT"
      - name: Create release
        uses: softprops/action-gh-release@v2.6.1
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          files: |
            kernel.zip
      - name: Upload kernel artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: kernel
          path: AnyKernel3-master/*
          compression-level: 9
